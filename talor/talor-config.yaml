# Talor 配置文件 - 使用本地 Ollama

# 默认模型（可选，格式：provider/model 或 model）
default_model: "ollama/deepseek-v3.1:671b-cloud"

# LLM 提供商配置
providers:
  ollama:
    api_key: "ollama"  # Ollama 不需要真实 API key
    base_url: "http://localhost:11434"

# MCP 服务器配置
mcp:
  playwright:
    command: "npx"
    args:
      - "@playwright/mcp@latest"
    transport: "stdio"

  pymupdf4llm-mcp: {
      command: "uvx",
      args: [
        "pymupdf4llm-mcp@latest",
        "stdio"
      ],
      env: {}
    }

# 权限配置
permissions:
  rules:
    - tool_pattern: "read_*"
      action: "allow"
      scope: "always"
    - tool_pattern: "write_*"
      action: "ask"
      scope: "session"
  dangerous_operations:
    - "delete_file"
    - "write_file"
    - "execute_command"

# 日志配置
logging:
  level: "INFO"

# UI 配置
ui:
  theme: "dark"
  font_size: 14
