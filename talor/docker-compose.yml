# Talor Docker Compose Configuration
# 
# Usage:
#   docker-compose up -d        # Start services
#   docker-compose down         # Stop services
#   docker-compose logs -f      # View logs

version: '3.8'

services:
  # Main Talor service
  talor:
    build:
      context: .
      dockerfile: Dockerfile
    image: talor:latest
    container_name: talor
    
    # Mount workspace and configuration
    volumes:
      - ./:/workspace:rw
      - talor-config:/home/talor/.config/talor
      - talor-data:/home/talor/.local/share/talor
    
    # Environment variables
    environment:
      - TALOR_LOG_LEVEL=${TALOR_LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    
    # Interactive mode
    stdin_open: true
    tty: true
    
    # Default command (override with docker-compose run)
    command: ["--help"]

  # Talor server mode
  talor-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: talor:latest
    container_name: talor-server
    
    # Mount workspace and configuration
    volumes:
      - ./:/workspace:rw
      - talor-config:/home/talor/.config/talor
      - talor-data:/home/talor/.local/share/talor
    
    # Environment variables
    environment:
      - TALOR_LOG_LEVEL=${TALOR_LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    
    # Expose server port
    ports:
      - "8080:8080"
    
    # Server command
    command: ["serve", "--host", "0.0.0.0", "--port", "8080"]
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Restart policy
    restart: unless-stopped

# Named volumes for persistent data
volumes:
  talor-config:
    driver: local
  talor-data:
    driver: local

# Networks (optional, for multi-service setups)
networks:
  default:
    name: talor-network
