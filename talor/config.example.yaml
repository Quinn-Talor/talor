# Talor 配置文件示例
# 复制此文件到以下位置之一：
#   macOS: ~/Library/Application Support/talor/config.yaml
#   Linux: ~/.config/talor/config.yaml
#   Windows: %APPDATA%\talor\config.yaml
# 或者项目级配置: <工作空间>/.talor/config.yaml

# LLM 提供商配置
providers:
  # OpenAI 配置
  # openai:
  #   api_key: "sk-your-openai-api-key"
  #   # base_url: "https://api.openai.com/v1"  # 可选，自定义端点
  #   default_model: "gpt-4o"
  
  # Anthropic 配置
  # anthropic:
  #   api_key: "sk-ant-your-anthropic-api-key"
  #   default_model: "claude-3-5-sonnet-20241022"
  
  # Azure OpenAI 配置（可选）
  # azure:
  #   api_key: "your-azure-api-key"
  #   base_url: "https://your-resource.openai.azure.com"
  #   default_model: "gpt-4"
  
  # 本地 Ollama 配置（可选）
  ollama:
    api_key: "ollama"  # 占位符
    base_url: "http://localhost:11434"
    default_model: "llama3"

# MCP 服务器配置（可选）
mcp_servers:
  # Playwright MCP - 浏览器自动化
  playwright:
    command: "npx"
    args:
      - "@playwright/mcp@latest"
    transport: "stdio"
  
  # 文件系统 MCP（示例）
  # filesystem:
  #   command: "mcp-server-filesystem"
  #   args: []
  #   transport: "stdio"

# 权限配置
permissions:
  rules:
    - tool_pattern: "read_*"
      action: "allow"
      scope: "always"
    - tool_pattern: "write_*"
      action: "ask"
      scope: "session"
  dangerous_operations:
    - "delete_file"
    - "write_file"
    - "execute_command"

# 日志配置
logging:
  level: "INFO"
  file_rotation: "1 day"
  max_file_size: "10 MB"

# 存储配置
storage:
  database_path: null  # 使用默认位置
  backup_enabled: true
  backup_interval: 24

# UI 配置
ui:
  theme: "dark"
  font_size: 14
  show_line_numbers: true
