<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Talor Logo - Hex-T</title>
  <desc>Hexagonal T-mark logo for Talor AI Agent Platform</desc>

  <defs>
    <!-- Blue to purple gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (optional, can be removed) -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.15"/>

  <!-- Hexagon outer -->
  <polygon
    points="128,28 208,78 208,178 128,228 48,178 48,78"
    fill="none"
    stroke="url(#grad1)"
    stroke-width="5"
    stroke-linejoin="round"
    opacity="0.4"
  />

  <!-- Inner filled hexagon (lighter) -->
  <polygon
    points="128,52 192,90 192,166 128,204 64,166 64,90"
    fill="url(#grad1)"
    opacity="0.12"
  />

  <!-- T-letterform: vertical bar -->
  <rect x="108" y="62" width="40" height="90" rx="4" fill="url(#grad1)" filter="url(#glow)"/>

  <!-- T-letterform: horizontal bar -->
  <rect x="76" y="62" width="104" height="30" rx="4" fill="url(#grad1)" filter="url(#glow)"/>

  <!-- Bottom accent dots (nodes — AI/agent feel) -->
  <circle cx="90"  cy="180" r="7" fill="url(#grad1)" opacity="0.7"/>
  <circle cx="128" cy="194" r="9" fill="url(#grad1)" opacity="0.9"/>
  <circle cx="166" cy="180" r="7" fill="url(#grad1)" opacity="0.7"/>

  <!-- Connecting lines to dots -->
  <line x1="108" y1="152" x2="90"  y2="173" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
  <line x1="128" y1="152" x2="128" y2="185" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
  <line x1="148" y1="152" x2="166" y2="173" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
</svg>
