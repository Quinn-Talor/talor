          - heading "Alibaba Group Holding Ltd. ADR" [level=2] [ref=e927]:
            - generic [ref=e928]: Alibaba Group Holding Ltd. ADR
          - paragraph [ref=e929]: "Alibaba Group Holding Ltd. engages in providing technology infrastructure and marketing reach. It operates through the following business segments: China Commerce, International Commerce, Local Consumer Services, Cainiao, Cloud, Digital Media and Entertainment, and Innovation Initiatives and Others segments. The Core Commerce segment consists of platforms operating in retail and wholesale. The China Commerce segment includes China commerce retail and wholesale businesses. The International Commerce segment focuses on international commerce retail and wholesale businesses. The Local Consumer Services segment is involved in \"To-Home\" businesses, which include Ele.me, local services and delivery platform, and Taoxianda, and \"To-Destination\" segment businesses which include Amap, the provider of mobile digital map, navigation and real-time traffic information, and restaurant and local services guide platform. The Cainiao segment has Cainiao Network and offers domestic and international one-stop-shop logistics services and supply chain management solution. The Cloud segment includes Alibaba Cloud and DingTalk. The company was founded by Chung Tsai and Yun Ma on June 28, 1999 and is headquartered in Hangzhou, China."
