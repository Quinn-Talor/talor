name: Bug report
description: Report a problem with Talor
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security vulnerabilities**, do not use this form — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including actual vs expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output from `~/Library/Logs/talor-desktop/main.log` (macOS) or the dev console. Redact API keys.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: '0.1.0 or commit sha'
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows (untested)
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Model provider
      placeholder: 'anthropic / openai / google / ollama / deepseek (openai-compatible)'
