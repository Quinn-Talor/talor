appId: com.talor.desktop
productName: Talor
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!**/.github/*'
  - '!src/*'
  - '!docs/*'
  - '!tests/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.editorconfig,.eslintrc.*,.prettierrc.*,.prettierignore,eslint.config.*,CHANGELOG.md,README.md,CLAUDE.md}'
  - '!{tsconfig.json,tsconfig.base.json,tsconfig.main.json,tsconfig.preload.json}'
  - '!**/*.test.ts'
  - '!**/*.test.tsx'
asarUnpack:
  - resources/**
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}-mac.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: Talor
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# publish: 暂未配置自动更新服务,使用手动分发。
#   配置方式参考 https://www.electron.build/configuration/publish
#   - provider: github        使用 GitHub Releases
#   - provider: generic       自托管 HTTP 服务器
#   - provider: s3            AWS S3
# 在 CI 环境变量里提供 GH_TOKEN / CSC_LINK 等实际凭据后再打开。
