# Electron Builder Configuration
#
# This file configures electron-builder for packaging the Talor desktop application
#
# Status: Pending implementation
# See: talor/docs/phase-3-4-implementation-guide.md for full configuration

appId: com.talor.app
productName: Talor
directories:
  output: dist-electron
  buildResources: assets

files:
  - dist/**/*
  - electron/**/*
  - package.json

# TODO: Add extraResources for Python backend
# extraResources:
#   - from: ../talor/dist/talor-backend
#     to: backend/

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
  # TODO: Add icon path
  # icon: assets/icons/icon.icns

win:
  target:
    - target: nsis
      arch: [x64]
  # TODO: Add icon path
  # icon: assets/icons/icon.ico

linux:
  target:
    - target: AppImage
      arch: [x64]
  # TODO: Add icon path
  # icon: assets/icons/icon.png
  category: Development
