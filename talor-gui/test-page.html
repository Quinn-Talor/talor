<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talor GUI Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Talor GUI 诊断页面</h1>

    <div class="test-section info">
        <h2>服务状态</h2>
        <p>前端开发服务器: <span id="frontend-status">检查中...</span></p>
        <p>后端 API 服务器: <span id="backend-status">检查中...</span></p>
    </div>

    <div class="test-section">
        <h2>API 测试</h2>
        <button onclick="testBackendHealth()">测试后端健康检查</button>
        <button onclick="testFrontendProxy()">测试前端代理</button>
        <button onclick="testSessions()">测试会话API</button>
        <button onclick="testTools()">测试工具API</button>
    </div>

    <div class="test-section">
        <h2>前端资源测试</h2>
        <button onclick="testMainJS()">测试 main.tsx</button>
        <button onclick="testAppJS()">测试 App.tsx</button>
        <button onclick="testCSS()">测试 CSS</button>
    </div>

    <div id="result"></div>

    <script>
        const resultDiv = document.getElementById('result');

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            resultDiv.innerHTML += `[${timestamp}] ${message}\n`;
            console.log(message);
        }

        async function checkServices() {
            // Check frontend
            try {
                const response = await fetch('http://localhost:5173/');
                document.getElementById('frontend-status').textContent =
                    response.ok ? '✓ 运行中' : '✗ 错误';
                document.getElementById('frontend-status').style.color =
                    response.ok ? 'green' : 'red';
            } catch (e) {
                document.getElementById('frontend-status').textContent = '✗ 无法连接';
                document.getElementById('frontend-status').style.color = 'red';
            }

            // Check backend
            try {
                const response = await fetch('http://127.0.0.1:8000/health');
                document.getElementById('backend-status').textContent =
                    response.ok ? '✓ 运行中' : '✗ 错误';
                document.getElementById('backend-status').style.color =
                    response.ok ? 'green' : 'red';
            } catch (e) {
                document.getElementById('backend-status').textContent = '✗ 无法连接';
                document.getElementById('backend-status').style.color = 'red';
            }
        }

        async function testBackendHealth() {
            log('测试后端健康检查...');
            try {
                const response = await fetch('http://127.0.0.1:8000/health');
                const data = await response.json();
                log(`✓ 成功: ${JSON.stringify(data, null, 2)}`, 'success');
            } catch (e) {
                log(`✗ 失败: ${e.message}`, 'error');
            }
        }

        async function testFrontendProxy() {
            log('测试前端代理...');
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                log(`✓ 成功: ${JSON.stringify(data, null, 2)}`, 'success');
            } catch (e) {
                log(`✗ 失败: ${e.message}`, 'error');
            }
        }

        async function testSessions() {
            log('测试会话API...');
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                log(`✓ 成功: 获取到 ${data.length} 个会话`, 'success');
            } catch (e) {
                log(`✗ 失败: ${e.message}`, 'error');
            }
        }

        async function testTools() {
            log('测试工具API...');
            try {
                const response = await fetch('/api/tools');
                const data = await response.json();
                log(`✓ 成功: 获取到 ${data.length} 个工具`, 'success');
            } catch (e) {
                log(`✗ 失败: ${e.message}`, 'error');
            }
        }

        async function testMainJS() {
            log('测试 main.tsx 加载...');
            try {
                const response = await fetch('/src/main.tsx');
                log(`✓ main.tsx 状态: ${response.status}`, 'success');
            } catch (e) {
                log(`✗ 失败: ${e.message}`, 'error');
            }
        }

        async function testAppJS() {
            log('测试 App.tsx 加载...');
            try {
                const response = await fetch('/src/App.tsx');
                log(`✓ App.tsx 状态: ${response.status}`, 'success');
            } catch (e) {
                log(`✗ 失败: ${e.message}`, 'error');
            }
        }

        async function testCSS() {
            log('测试 CSS 加载...');
            try {
                const response = await fetch('/src/index.css');
                log(`✓ CSS 状态: ${response.status}`, 'success');
            } catch (e) {
                log(`✗ 失败: ${e.message}`, 'error');
            }
        }

        // Check services on load
        checkServices();
        log('诊断页面已加载');
    </script>
</body>
</html>
