<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Test</title>
    <style>
        body { margin: 0; padding: 20px; font-family: system-ui; }
        .test { padding: 20px; background: #f0f0f0; border: 2px solid #333; }
    </style>
</head>
<body>
    <div class="test">
        <h1>Minimal HTML Test</h1>
        <p>If you can see this, basic HTML rendering works.</p>
        <button onclick="testBackend()">Test Backend</button>
        <div id="result"></div>
    </div>

    <script>
        async function testBackend() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                result.innerHTML = `<pre>Backend OK: ${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                result.innerHTML = `<pre style="color: red;">Error: ${error.message}</pre>`;
            }
        }

        // Auto-test on load
        testBackend();
    </script>
</body>
</html>
