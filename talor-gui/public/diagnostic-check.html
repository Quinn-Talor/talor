<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talor GUI Diagnostic</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #fff; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Talor GUI Diagnostic Check</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        async function checkBackend() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                return { success: true, data };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function checkSessions() {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                return { success: true, data };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function runDiagnostics() {
            results.innerHTML = '<div class="info">Running diagnostics...</div>';

            // Check backend health
            const healthCheck = await checkBackend();
            if (healthCheck.success) {
                results.innerHTML += `<div class="status success">✓ Backend is running: ${JSON.stringify(healthCheck.data)}</div>`;
            } else {
                results.innerHTML += `<div class="status error">✗ Backend check failed: ${healthCheck.error}</div>`;
            }

            // Check sessions endpoint
            const sessionsCheck = await checkSessions();
            if (sessionsCheck.success) {
                results.innerHTML += `<div class="status success">✓ Sessions API working: ${sessionsCheck.data.length} sessions</div>`;
            } else {
                results.innerHTML += `<div class="status error">✗ Sessions API failed: ${sessionsCheck.error}</div>`;
            }

            // Check if main app is accessible
            results.innerHTML += '<div class="info">Main app should be at: <a href="/">http://localhost:5173/</a></div>';

            // Browser info
            results.innerHTML += `<div class="info">Browser: ${navigator.userAgent}</div>`;
        }

        runDiagnostics();
    </script>
</body>
</html>
