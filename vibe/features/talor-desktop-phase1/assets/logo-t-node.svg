<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Talor Logo - T-Node</title>
  <desc>Connected node T-mark — AI agent network</desc>

  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C084FC;stop-opacity:1" />
    </linearGradient>

    <filter id="glow3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background subtle grid dots -->
  <g opacity="0.08">
    <circle cx="32"  cy="32"  r="2.5" fill="url(#grad3)"/>
    <circle cx="64"  cy="32"  r="2.5" fill="url(#grad3)"/>
    <circle cx="96"  cy="32"  r="2.5" fill="url(#grad3)"/>
    <circle cx="128" cy="32"  r="2.5" fill="url(#grad3)"/>
    <circle cx="160" cy="32"  r="2.5" fill="url(#grad3)"/>
    <circle cx="192" cy="32"  r="2.5" fill="url(#grad3)"/>
    <circle cx="224" cy="32"  r="2.5" fill="url(#grad3)"/>
    <circle cx="32"  cy="64"  r="2.5" fill="url(#grad3)"/>
    <circle cx="64"  cy="64"  r="2.5" fill="url(#grad3)"/>
    <circle cx="96"  cy="64"  r="2.5" fill="url(#grad3)"/>
    <circle cx="160" cy="64"  r="2.5" fill="url(#grad3)"/>
    <circle cx="192" cy="64"  r="2.5" fill="url(#grad3)"/>
    <circle cx="224" cy="64"  r="2.5" fill="url(#grad3)"/>
    <circle cx="32"  cy="96"  r="2.5" fill="url(#grad3)"/>
    <circle cx="160" cy="96"  r="2.5" fill="url(#grad3)"/>
    <circle cx="192" cy="96"  r="2.5" fill="url(#grad3)"/>
    <circle cx="224" cy="96"  r="2.5" fill="url(#grad3)"/>
    <circle cx="32"  cy="128" r="2.5" fill="url(#grad3)"/>
    <circle cx="224" cy="128" r="2.5" fill="url(#grad3)"/>
    <circle cx="32"  cy="160" r="2.5" fill="url(#grad3)"/>
    <circle cx="224" cy="160" r="2.5" fill="url(#grad3)"/>
    <circle cx="32"  cy="192" r="2.5" fill="url(#grad3)"/>
    <circle cx="64"  cy="192" r="2.5" fill="url(#grad3)"/>
    <circle cx="160" cy="192" r="2.5" fill="url(#grad3)"/>
    <circle cx="192" cy="192" r="2.5" fill="url(#grad3)"/>
    <circle cx="224" cy="192" r="2.5" fill="url(#grad3)"/>
    <circle cx="32"  cy="224" r="2.5" fill="url(#grad3)"/>
    <circle cx="64"  cy="224" r="2.5" fill="url(#grad3)"/>
    <circle cx="96"  cy="224" r="2.5" fill="url(#grad3)"/>
    <circle cx="128" cy="224" r="2.5" fill="url(#grad3)"/>
    <circle cx="160" cy="224" r="2.5" fill="url(#grad3)"/>
    <circle cx="192" cy="224" r="2.5" fill="url(#grad3)"/>
    <circle cx="224" cy="224" r="2.5" fill="url(#grad3)"/>
  </g>

  <!-- Node network edges (behind T) -->
  <g stroke="url(#grad3)" stroke-width="2" opacity="0.25" stroke-linecap="round">
    <line x1="64"  y1="64"  x2="128" y2="90"/>
    <line x1="192" y1="64"  x2="128" y2="90"/>
    <line x1="64"  y1="192" x2="128" y2="166"/>
    <line x1="192" y1="192" x2="128" y2="166"/>
    <line x1="64"  y1="64"  x2="64"  y2="192"/>
    <line x1="192" y1="64"  x2="192" y2="192"/>
    <line x1="128" y1="90"  x2="128" y2="166"/>
    <line x1="64"  y1="64"  x2="192" y2="192"/>
    <line x1="192" y1="64"  x2="64"  y2="192"/>
  </g>

  <!-- T-vertical (solid, glowing) -->
  <rect x="103" y="56" width="50" height="100" rx="8" fill="url(#grad3)" filter="url(#glow3)"/>

  <!-- T-horizontal (solid, glowing) -->
  <rect x="58" y="56" width="140" height="38" rx="8" fill="url(#grad3)" filter="url(#glow3)"/>

  <!-- Corner nodes -->
  <circle cx="64"  cy="64"  r="9" fill="url(#grad3)" opacity="0.85"/>
  <circle cx="192" cy="64"  r="9" fill="url(#grad3)" opacity="0.85"/>
  <circle cx="64"  cy="192" r="9" fill="url(#grad3)" opacity="0.85"/>
  <circle cx="192" cy="192" r="9" fill="url(#grad3)" opacity="0.85"/>

  <!-- Center node on T crossbar -->
  <circle cx="128" cy="90"  r="11" fill="url(#grad3)" opacity="0.95"/>
  <circle cx="128" cy="166" r="8"  fill="url(#grad3)" opacity="0.7"/>

  <!-- Accent ring around center -->
  <circle cx="128" cy="90" r="18" fill="none" stroke="url(#grad3)" stroke-width="2" opacity="0.35"/>
</svg>
